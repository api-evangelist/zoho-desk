aid: zoho-desk
name: Zoho Desk
description: >-
  Zoho Desk is a cloud-based customer support and help desk platform that helps
  businesses manage tickets, contacts, accounts, knowledge base articles, and
  community forums across multiple support channels. The Zoho Desk REST API
  provides programmatic access to tickets, threads, contacts, agents,
  departments, tasks, and knowledge base content using OAuth 2.0 authentication
  scoped per organization.
