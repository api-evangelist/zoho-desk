apis:
  - aid: zoho-desk:zoho-desk-api
    name: Zoho Desk REST API
    description: >-
      REST API for Zoho Desk providing CRUD operations across tickets, threads,
      contacts, accounts, agents, departments, tasks, calls, events, articles,
      and knowledge base content. Uses OAuth 2.0 with the Zoho-oauthtoken header
      and an orgId header to scope requests to a specific organization.
    humanURL: https://desk.zoho.com/DeskAPIDocument
    baseURL: https://desk.zoho.com/api/v1
